name: cauchy
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - astropy>=5.3
  - h5py
  - pip
  - pip:
      - gudhi>=3.8
      - treecorr>=5.0
      # Branch B (SE(3)-equivariant network) — install the CUDA build of
      # torch matching your system from https://pytorch.org, then:
      - e3nn==0.6.0
      # Optional utilities
      - pysr
      # Pylians (density field / power spectrum): install per upstream instructions
      # https://pylians3.readthedocs.io/
